# Relay cache & replay settings
# Server
HOST=127.0.0.1
PORT=3001

# How many messages-upsert events to keep per conversation for replay
RELAY_REPLAY_BUFFER_SIZE=200

# Max replay buffer keys kept across conversations
RELAY_REPLAY_BUFFER_KEYS_MAX=512

# TTL for idle replay buffer keys
RELAY_REPLAY_BUFFER_TTL_MS=1800000

# Max cached snapshots across conversations (LRU)
RELAY_SNAPSHOT_CACHE_MAX=50

# Max bytes per cached snapshot (JSON-encoded). Oversize snapshots are dropped.
RELAY_SNAPSHOT_MAX_BYTES=200000

# Max Socket.IO / Engine.IO message payload. Increase this for large terminal frame resets.
RELAY_SOCKET_MAX_HTTP_BUFFER_SIZE=8388608

# Timeout for forwarding CLI commands
RELAY_CLI_COMMAND_TIMEOUT_MS=30000

# Relay cache GC cadence
RELAY_CACHE_GC_INTERVAL_MS=60000

# TTL for disconnected CLI records without active web subscribers
RELAY_DISCONNECTED_CLI_TTL_MS=1800000
