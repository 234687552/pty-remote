# CLI config for pty-remote
# Lines are KEY=VALUE. Empty values are ignored. Environment variables override this file.

# Socket
HOST=127.0.0.1
PORT=3001
# SOCKET_URL=

# Providers
PTY_REMOTE_PROVIDERS=claude,codex

# CLI identity
# PTY_REMOTE_CLI_ID=

# Terminal
TERMINAL_COLS=120
TERMINAL_ROWS=32
TERMINAL_FRAME_SCROLLBACK=500

# Timeouts & debounce
CLAUDE_READY_TIMEOUT_MS=20000
SNAPSHOT_EMIT_DEBOUNCE_MS=200

# Snapshot limits
SNAPSHOT_MESSAGES_MAX=40
OLDER_MESSAGES_PAGE_MAX=40

# GC / TTL
GC_INTERVAL_MS=300000

# Provider bins

# Claude permission mode
CLAUDE_PERMISSION_MODE=bypassPermissions

# Codex app-server
# CODEX_HOME=

# CODEX_APP_SERVER_READY_TIMEOUT_MS=15000
# CODEX_APP_SERVER_POLL_IDLE_MS=2500
# CODEX_APP_SERVER_POLL_RUNNING_MS=700
# CODEX_APP_SERVER_PORT=
